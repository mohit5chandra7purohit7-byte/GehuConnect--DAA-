<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GehuConnect</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7fa; color: #333; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #1a73e8; margin-top: 0; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button[type="submit"] { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.3s; margin-top: 10px; }
        button[type="submit"]:hover { background: #1557b0; }
        .message { margin-top: 15px; font-weight: bold; color: red; min-height: 20px; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>GehuConnect Admin</h2>
    <form id="loginForm">
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit">Secure Login</button>
    </form>
    <div id="loginMsg" class="message"></div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msgDiv = document.getElementById('loginMsg');
        msgDiv.textContent = 'Authenticating...';
        msgDiv.style.color = '#333';

        const data = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        try {
            const response = await fetch('/api/admin_login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            
            if (response.ok) {
                msgDiv.style.color = 'green';
                msgDiv.textContent = 'Success! Redirecting...';
                setTimeout(() => {
                    window.location.href = '/admin';
                }, 1000);
            } else {
                msgDiv.style.color = 'red';
                msgDiv.textContent = result.error || 'Login failed';
            }
        } catch (err) {
            msgDiv.style.color = 'red';
            msgDiv.textContent = 'Server connection error.';
        }
    });
</script>

</body>
</html>
