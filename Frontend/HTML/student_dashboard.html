<!DOCTYPE html>
<html>
<head>
    <title>GehuConnect - Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f0f0; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        td { padding: 10px; border: 1px solid #ddd; }
        td:first-child { background: #ecf0f1; font-weight: bold; width: 40%; }
        .nav { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .nav a { padding: 10px 16px; background: #2980b9; color: white; text-decoration: none; border-radius: 4px; font-size: 14px; }
        .nav a:hover { background: #1a6298; }
        .logout { background: #e74c3c !important; }
        .logout:hover { background: #c0392b !important; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Student Dashboard</h2>
        <p id="welcome" style="color:#777;"></p>

        <table>
            <tr><td>Name</td><td id="s-name">-</td></tr>
            <tr><td>Student ID</td><td id="s-id">-</td></tr>
            <tr><td>Branch</td><td id="s-branch">-</td></tr>
            <tr><td>CGPA</td><td id="s-cgpa">-</td></tr>
            <tr><td>Hostel</td><td id="s-hostel">-</td></tr>
            <tr><td>Room</td><td id="s-room">-</td></tr>
            <tr><td>Phone</td><td id="s-phone">-</td></tr>
        </table>

        <div class="nav">
            <a href="attendance.html">Attendance</a>
            <a href="notices.html">Notices</a>
            <a href="assignments.html">Assignments</a>
            <a href="#" class="logout" onclick="logout()">Logout</a>
        </div>
    </div>

    <script>
        var student = JSON.parse(sessionStorage.getItem("student"));

        if (!student) {
            window.location.href = "index.html";
        } else {
            document.getElementById("welcome").innerText  = "Welcome back, " + student.name + "!";
            document.getElementById("s-name").innerText   = student.name;
            document.getElementById("s-id").innerText     = student.id;
            document.getElementById("s-branch").innerText = student.branch;
            document.getElementById("s-cgpa").innerText   = student.cgpa;
            document.getElementById("s-hostel").innerText = student.hostel;
            document.getElementById("s-room").innerText   = student.room;
            document.getElementById("s-phone").innerText  = student.phone;
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
