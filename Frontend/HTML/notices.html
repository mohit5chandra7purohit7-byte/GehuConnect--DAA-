<!DOCTYPE html>
<html>
<head>
    <title>GehuConnect - Notices</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f0f0; margin: 0; padding: 20px; }
        .container { max-width: 650px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; }
        select { padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        ul { list-style: none; padding: 0; margin-top: 15px; }
        li { padding: 12px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 8px; background: #fafafa; }
        li.urgent { font-weight: bold; border-left: 4px solid red; }
        .tag { font-size: 11px; background: #2980b9; color: white; padding: 2px 7px; border-radius: 10px; margin-left: 8px; }
        .tag.urgent { background: red; }
        .date { font-size: 12px; color: #999; margin-top: 4px; }
        .back { display: inline-block; margin-top: 15px; padding: 8px 14px; background: #7f8c8d; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Notices</h2>

        <label>Filter by category:
            <select id="cat-filter" onchange="filterNotices()">
                <option value="all">All</option>
                <option value="Fee">Fee</option>
                <option value="Event">Event</option>
                <option value="Exam">Exam</option>
                <option value="Academic">Academic</option>
            </select>
        </label>

        <ul id="notice-list">
            <li>Loading...</li>
        </ul>

        <a href="student_dashboard.html" class="back">← Back to Dashboard</a>
    </div>

    <script>
        var allNotices = [];

        fetch("http://localhost:5000/notices?category=all")
            .then(function(res) { return res.json(); })
            .then(function(data) {
                allNotices = data;
                renderNotices(allNotices);
            })
            .catch(function() {
                document.getElementById("notice-list").innerHTML = "<li>Failed to load notices.</li>";
            });

        function filterNotices() {
            var selected = document.getElementById("cat-filter").value;
            if (selected === "all") {
                renderNotices(allNotices);
            } else {
                var filtered = allNotices.filter(function(n) { return n.category === selected; });
                renderNotices(filtered);
            }
        }

        function renderNotices(list) {
            var ul = document.getElementById("notice-list");
            ul.innerHTML = "";
            if (list.length === 0) {
                ul.innerHTML = "<li>No notices in this category.</li>";
                return;
            }
            for (var i = 0; i < list.length; i++) {
                var n = list[i];
                var li = document.createElement("li");
                if (n.urgency === "urgent") li.className = "urgent";
                li.innerHTML = n.title
                    + "<span class='tag " + n.urgency + "'>" + n.category + "</span>"
                    + "<div class='date'>" + n.date + "</div>";
                ul.appendChild(li);
            }
        }
    </script>
</body>
</html>
