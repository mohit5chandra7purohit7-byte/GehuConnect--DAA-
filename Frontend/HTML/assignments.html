<!DOCTYPE html>
<html>
<head>
    <title>GehuConnect - Assignments</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f0f0; margin: 0; padding: 20px; }
        .container { max-width: 650px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #2980b9; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border: 1px solid #ddd; }
        tr:nth-child(even) { background: #f9f9f9; }
        tr.most-urgent { background: #ffeaa7 !important; font-weight: bold; }
        .back { display: inline-block; margin-top: 15px; padding: 8px 14px; background: #7f8c8d; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Assignments</h2>
        <p style="font-size:13px; color:#999;">⚡ Sorted by nearest due date first. Highlighted row = most urgent.</p>
        <p id="status" style="color:#777;">Loading...</p>

        <table id="asgn-table" style="display:none;">
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Assignment Title</th>
                    <th>Due Date</th>
                </tr>
            </thead>
            <tbody id="asgn-body"></tbody>
        </table>

        <a href="student_dashboard.html" class="back">← Back to Dashboard</a>
    </div>

    <script>
        var student = JSON.parse(sessionStorage.getItem("student"));
        if (!student) { window.location.href = "index.html"; }

        fetch("http://localhost:5000/assignments?id=" + student.id)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                document.getElementById("status").style.display = "none";
                document.getElementById("asgn-table").style.display = "table";

                var tbody = document.getElementById("asgn-body");
                tbody.innerHTML = "";

                for (var i = 0; i < data.length; i++) {
                    var a = data[i];
                    var tr = document.createElement("tr");
                    if (i === 0) tr.className = "most-urgent";  // first row highlighted
                    tr.innerHTML = "<td>" + a.subject + "</td><td>" + a.title + "</td><td>" + a.due_date + "</td>";
                    tbody.appendChild(tr);
                }
            })
            .catch(function() {
                document.getElementById("status").innerText = "Failed to load assignments.";
            });
    </script>
</body>
</html>
