<!DOCTYPE html>
<html>
<head>
    <title>GehuConnect - Attendance</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f0f0; margin: 0; padding: 20px; }
        .container { max-width: 650px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #2980b9; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border: 1px solid #ddd; }
        tr:nth-child(even) { background: #f9f9f9; }
        .ok { color: green; font-weight: bold; }
        .warn { color: red; font-weight: bold; }
        .back { display: inline-block; margin-top: 15px; padding: 8px 14px; background: #7f8c8d; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Attendance Report</h2>
        <p id="status" style="color:#777;">Loading...</p>

        <table id="att-table" style="display:none;">
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Attendance %</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="att-body"></tbody>
        </table>

        <a href="student_dashboard.html" class="back">← Back to Dashboard</a>
    </div>

    <script>
        var student = JSON.parse(sessionStorage.getItem("student"));
        if (!student) { window.location.href = "index.html"; }

        document.getElementById("status").innerText = "Loading attendance for " + student.name + "...";

        fetch("http://localhost:5000/attendance?id=" + student.id)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                document.getElementById("status").style.display = "none";
                document.getElementById("att-table").style.display = "table";

                var tbody = document.getElementById("att-body");
                tbody.innerHTML = "";

                for (var i = 0; i < data.length; i++) {
                    var row = data[i];
                    var statusText = row.warning ? "<span class='warn'>⚠ WARNING</span>" : "<span class='ok'>✔ OK</span>";
                    var tr = document.createElement("tr");
                    tr.innerHTML = "<td>" + row.subject + "</td><td>" + row.percentage + "%</td><td>" + statusText + "</td>";
                    tbody.appendChild(tr);
                }
            })
            .catch(function() {
                document.getElementById("status").innerText = "Failed to load attendance data.";
            });
    </script>
</body>
</html>
