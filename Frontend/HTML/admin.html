<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Dashboard - GehuConnect</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7fa; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 20px auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { color: #1a73e8; margin: 0; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .logout-btn:hover { background: #c82333; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
        .tab-btn { padding: 10px 15px; border: 1px solid #1a73e8; background: white; color: #1a73e8; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #1a73e8; color: white; }
        .form-section { display: none; }
        .form-section.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="number"], input[type="date"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button[type="submit"] { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button[type="submit"]:hover { background: #1557b0; }
        .message { margin-top: 15px; text-align: center; font-weight: bold; min-height: 20px; }
        .success { color: green; }
        .error { color: red; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #f4f7fa; }
        .del-btn { background: #dc3545; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .del-btn:hover { background: #c82333; }
        .data-tables-section { margin-top: 30px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <h2>GehuConnect Database Admin</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('student')">Add Student</button>
        <button class="tab-btn" onclick="showTab('attendance')">Add Attendance</button>
        <button class="tab-btn" onclick="showTab('assignment')">Add Assignment</button>
        <button class="tab-btn" onclick="showTab('notice')">Add Notice</button>
        <button class="tab-btn" onclick="showTab('manage')">Manage Student</button>
    </div>

    <!-- MANAGE STUDENT FORM -->
    <div id="manage" class="form-section">
        <div class="form-group" style="display: flex; gap: 10px;">
            <input type="text" id="searchId" placeholder="Enter Student ID" required />
            <button onclick="fetchStudentData()" style="width: auto;">Fetch Student</button>
        </div>
        <div id="fetchMsg" class="message"></div>
        
        <div id="manageContent" class="data-tables-section">
            <form id="updateStudentForm" onsubmit="submitForm(event, '/api/update_student', 'updateMsg')">
                <input type="hidden" name="old_id" id="oldId" />
                <div class="form-group"><label>Student ID</label><input type="text" name="id" id="editId" required /></div>
                <div class="form-group"><label>Name</label><input type="text" name="name" id="editName" required /></div>
                <div class="form-group"><label>Branch</label><input type="text" name="branch" id="editBranch" required /></div>
                <div class="form-group"><label>CGPA</label><input type="number" name="cgpa" id="editCgpa" step="0.1" required /></div>
                <div class="form-group"><label>Hostel</label><input type="text" name="hostel" id="editHostel" required /></div>
                <div class="form-group"><label>Room</label><input type="text" name="room" id="editRoom" required /></div>
                <div class="form-group"><label>Phone</label><input type="text" name="phone" id="editPhone" required /></div>
                <button type="submit">Save Profile Changes</button>
                <div id="updateMsg" class="message"></div>
            </form>

            <h3 style="color: #1a73e8; margin-top: 30px;">Attendance Records</h3>
            <table>
                <thead><tr><th>Subject</th><th>Percentage</th><th>Action</th></tr></thead>
                <tbody id="attendanceTbody"></tbody>
            </table>

            <h3 style="color: #1a73e8; margin-top: 30px;">Assignments</h3>
            <table>
                <thead><tr><th>Subject</th><th>Title</th><th>Due Date</th><th>Action</th></tr></thead>
                <tbody id="assignmentsTbody"></tbody>
            </table>
        </div>
    </div>

    <!-- ADD STUDENT FORM -->
    <div id="student" class="form-section active">
        <form id="addStudentForm" onsubmit="submitForm(event, '/add_student', 'studentMsg')">
            <div class="form-group"><label>Student ID</label><input type="text" name="id" required /></div>
            <div class="form-group"><label>Name</label><input type="text" name="name" required /></div>
            <div class="form-group"><label>Branch</label><input type="text" name="branch" required /></div>
            <div class="form-group"><label>CGPA</label><input type="number" name="cgpa" step="0.1" required /></div>
            <div class="form-group"><label>Hostel</label><input type="text" name="hostel" required /></div>
            <div class="form-group"><label>Room</label><input type="text" name="room" required /></div>
            <div class="form-group"><label>Phone</label><input type="text" name="phone" required /></div>
            <button type="submit">Add Student</button>
        </form>
        <div id="studentMsg" class="message"></div>
    </div>

    <!-- ADD ATTENDANCE FORM -->
    <div id="attendance" class="form-section">
        <form id="addAttendanceForm" onsubmit="submitForm(event, '/add_attendance', 'attendanceMsg')">
            <div class="form-group"><label>Student ID</label><input type="text" name="student_id" required /></div>
            <div class="form-group"><label>Subject</label><input type="text" name="subject" required /></div>
            <div class="form-group"><label>Percentage (%)</label><input type="number" name="percentage" step="0.1" required /></div>
            <button type="submit">Add Attendance</button>
        </form>
        <div id="attendanceMsg" class="message"></div>
    </div>

    <!-- ADD ASSIGNMENT FORM -->
    <div id="assignment" class="form-section">
        <form id="addAssignmentForm" onsubmit="submitForm(event, '/add_assignment', 'assignmentMsg')">
            <div class="form-group"><label>Student ID</label><input type="text" name="student_id" required /></div>
            <div class="form-group"><label>Subject</label><input type="text" name="subject" required /></div>
            <div class="form-group"><label>Assignment Title</label><input type="text" name="title" required /></div>
            <div class="form-group"><label>Due Date</label><input type="date" name="due_date" required /></div>
            <button type="submit">Add Assignment</button>
        </form>
        <div id="assignmentMsg" class="message"></div>
    </div>

    <!-- ADD NOTICE FORM -->
    <div id="notice" class="form-section">
        <form id="addNoticeForm" onsubmit="submitForm(event, '/add_notice', 'noticeMsg')">
            <div class="form-group"><label>Notice Title</label><input type="text" name="title" required /></div>
            <div class="form-group"><label>Category</label>
                <select name="category" required>
                    <option value="Academic">Academic</option>
                    <option value="Fee">Fee</option>
                    <option value="Event">Event</option>
                    <option value="Exam">Exam</option>
                </select>
            </div>
            <div class="form-group"><label>Date (YYYY-MM-DD)</label><input type="date" name="date" required /></div>
            <div class="form-group"><label>Urgency</label>
                <select name="urgency" required>
                    <option value="normal">Normal</option>
                    <option value="urgent">Urgent</option>
                </select>
            </div>
            <button type="submit">Add Notice</button>
        </form>
        <div id="noticeMsg" class="message"></div>
    </div>
</div>

<script>
    async function logout() {
        try {
            await fetch('/api/admin_logout', { method: 'POST' });
            window.location.href = '/admin_login.html';
        } catch(e) { console.error('Logout failed'); }
    }

    function showTab(tabId) {
        document.querySelectorAll('.form-section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
    }

    async function submitForm(e, endpoint, msgId) {
        e.preventDefault();
        const msgDiv = document.getElementById(msgId);
        msgDiv.textContent = 'Saving...';
        msgDiv.className = 'message';

        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        // Convert number types appropriately
        if(data.cgpa) data.cgpa = parseFloat(data.cgpa);
        if(data.percentage) data.percentage = parseFloat(data.percentage);

        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            
            if (response.ok) {
                msgDiv.textContent = result.message;
                msgDiv.classList.add('success');
                e.target.reset(); // clear form
            } else {
                msgDiv.textContent = 'Error: ' + result.error;
                msgDiv.classList.add('error');
            }
        } catch (err) {
            msgDiv.textContent = 'Failed to connect to server.';
            msgDiv.classList.add('error');
        }
    }

    async function fetchStudentData() {
        const id = document.getElementById('searchId').value;
        const msg = document.getElementById('fetchMsg');
        const content = document.getElementById('manageContent');
        if(!id) return;
        
        msg.textContent = 'Fetching...'; msg.className = 'message';
        content.style.display = 'none';

        try {
            const res = await fetch(`/api/get_student_full?id=${id}`);
            const data = await res.json();
            
            if(res.ok) {
                msg.textContent = '';
                content.style.display = 'block';
                
                // Populate Profile
                document.getElementById('oldId').value = data.student.id;
                document.getElementById('editId').value = data.student.id;
                document.getElementById('editName').value = data.student.name;
                document.getElementById('editBranch').value = data.student.branch;
                document.getElementById('editCgpa').value = data.student.cgpa;
                document.getElementById('editHostel').value = data.student.hostel;
                document.getElementById('editRoom').value = data.student.room;
                document.getElementById('editPhone').value = data.student.phone;
                
                // Populate Attendance
                const attBody = document.getElementById('attendanceTbody');
                attBody.innerHTML = '';
                data.attendance.forEach(a => {
                    attBody.innerHTML += `<tr><td>${a.subject}</td><td>${a.percentage}%</td><td><button class="del-btn" onclick="deleteRecord('attendance', ${a.id})">❌</button></td></tr>`;
                });
                
                // Populate Assignments
                const assBody = document.getElementById('assignmentsTbody');
                assBody.innerHTML = '';
                data.assignments.forEach(a => {
                    assBody.innerHTML += `<tr><td>${a.subject}</td><td>${a.title}</td><td>${a.due_date}</td><td><button class="del-btn" onclick="deleteRecord('assignments', ${a.id})">❌</button></td></tr>`;
                });
            } else {
                msg.textContent = data.error; msg.classList.add('error');
            }
        } catch(e) {
            msg.textContent = 'Server error'; msg.classList.add('error');
        }
    }

    async function deleteRecord(table, id) {
        if(!confirm('Delete this record?')) return;
        try {
            const res = await fetch('/api/delete_record', {
                method: 'POST',
                headers:{ 'Content-Type': 'application/json' },
                body: JSON.stringify({table, id})
            });
            if(res.ok) { fetchStudentData(); }
            else { alert('Failed to delete'); }
        } catch(e) { alert('Server error'); }
    }
</script>

</body>
</html>
